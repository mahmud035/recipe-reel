<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicons (files served from public/ at root) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="রাঁধুনি" />
    <meta property="og:description" content="ইউটিউব ভিডিও থেকে রেসিপি নোট" />

      property="og:image"
      content="https://recipe-note-app.vercel.app/og-image.png"

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://recipe-note-app.vercel.app" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="রাঁধুনি" />
    <meta name="twitter:description" content="ইউটিউব ভিডিও থেকে রেসিপি নোট" />
    <meta
      name="twitter:image"
      content="https://recipe-note-app.vercel.app/og-image.png"
    />

    <title>রাঁধুনি</title>
